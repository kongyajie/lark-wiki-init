# 最小示例：创建一个简单的知识库结构
# space 填知识库空间 ID（数字），可通过 lark-cli wiki spaces list 查看
# 也可以填 my_library 表示个人知识库
space: "7620663498296642741"
root:
  title: "测试知识库"
  content: "# 测试知识库\n\n这是一个测试知识库。"
  children:
    - title: "文档一"
      content: "# 文档一\n\n这是第一篇文档。"
    - title: "文档二"
      content: "# 文档二\n\n这是第二篇文档。"
